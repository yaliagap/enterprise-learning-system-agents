name: enterprise-learning-agent
description: >
  Enterprise AI learning system with assessment, certification guidance,
  and grounded question generation via AG-UI invocations protocol.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Invocations Protocol
    - AG-UI
template:
  name: enterprise-learning-agent
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    - name: FOUNDRY_PROJECT_ENDPOINT
      value: "{{FOUNDRY_PROJECT_ENDPOINT}}"
    - name: FOUNDRY_MODEL
      value: "{{FOUNDRY_MODEL}}"
    - name: AZURE_SEARCH_ENDPOINT
      value: "{{AZURE_SEARCH_ENDPOINT}}"
    - name: FOUNDRY_IQ_KB_NAME
      value: "{{FOUNDRY_IQ_KB_NAME}}"
    - name: ALLOWED_ORIGINS
      value: "{{ALLOWED_ORIGINS}}"
    - name: USE_REAL_IQ
      value: "true"
resources:
  - kind: model
    id: gpt-4o
    name: FOUNDRY_MODEL
